<!DOCTYPE html>
<html lang="en" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Section Divider — Escrow</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d1117;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
            position: relative;
        }

        /* Minimalist Background Pattern - Using SVG data URI to avoid CSS gradients */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='%2330363d'/%3E%3C/svg%3E");
            background-size: 40px 40px;
        }

        /* Large decorative circle behind text */
        .decoration-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 1px solid rgba(48, 54, 61, 0.3);
            border-radius: 50%;
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .decoration-circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            border: 1px solid rgba(48, 54, 61, 0.3);
            border-radius: 50%;
        }

        /* Content Wrapper */
        .content-wrapper {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Icon Container */
        .icon-container {
            width: 100px;
            height: 100px;
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Icon styling */
        .icon-container i {
            font-size: 3.5rem;
            color: #28a0f0; /* WebAuthn Blue accent maintained for consistency */
        }

        /* Connecting vertical line above icon */
        .line-top {
            position: absolute;
            top: -1000px; /* Extend to top of screen */
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 1000px;
            background-color: #30363d;
            z-index: 5;
        }
        
        /* Connecting vertical line below text */
         .line-bottom {
            position: absolute;
            bottom: -1000px; /* Extend to bottom of screen */
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 1000px; /* Length */
            background-color: #30363d;
            z-index: 5;
        }

        /* Typography */
        h1 {
            font-size: 4rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.25rem;
            color: #8b949e;
            margin: 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .section-number {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            color: #28a0f0;
            font-weight: 600;
            background-color: rgba(40, 160, 240, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(40, 160, 240, 0.2);
            margin-bottom: 10px;
        }

        /* Decorative horizontal lines */
        .h-line-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 20px;
            margin-top: 10px;
        }

        .h-line {
            width: 60px;
            height: 2px;
            background-color: #30363d;
        }

    </style>
</head>
<body style="">
<div class="slide-container">
<!-- Background Elements -->
<div class="bg-pattern"></div>
<div class="decoration-circle"></div>
<!-- Vertical decorative lines -->
<div class="line-top" style="top: -500px; height: 500px; position: absolute; left: 50%;"></div>
<div class="line-bottom" style="bottom: -500px; height: 500px; position: absolute; left: 50%;"></div>
<!-- Main Content -->
<div class="content-wrapper">
<div class="section-number">
<p>Coding Example #2</p>
</div>
<div class="icon-container">
<i class="fa-solid fa-handshake"></i>
</div>
<div class="text-content">
<p class="subtitle">Trustless Custody</p>
<h1>Escrow</h1>
<div class="h-line-container">
<div class="h-line"></div>
<div class="h-line"></div>
</div>
</div>
</div>
</div>

<!-- slide-scale -->
<script>
  (function () {
    if (window.self !== window.top) return;
    const slide = document.querySelector(".slide-container");
    if (!slide) return;
    const baseWidth = slide.offsetWidth || 1280;
    const baseHeight = slide.offsetHeight || 720;
    function applyScale() {
      const scale = window.innerHeight / baseHeight;
      const offsetX = (window.innerWidth - baseWidth * scale) / 2;
      const offsetY = (window.innerHeight - baseHeight * scale) / 2;
      slide.style.transformOrigin = "top left";
      slide.style.transform =
        "translate(" + offsetX + "px, " + offsetY + "px) scale(" + scale + ")";
    }
    window.addEventListener("resize", applyScale);
    applyScale();
  })();
</script>


</body></html>
